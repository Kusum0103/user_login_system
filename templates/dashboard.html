<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <meta name="description" content="Secure User Dashboard">
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <div class="dashboard-grid">

        <!-- Left Sidebar Section -->
        {% include 'partials/sidebar.html' %}

        <!-- Right Main Panel Section -->
        <div class="main-card">

            <!-- Dashboard Tab Bar -->
            <div class="dashboard-tabs">
                <button id="btn-tab-interview" class="tab-link active" onclick="switchDashboardTab('interview')">Start
                    Mock Interview</button>
                <button id="btn-tab-history" class="tab-link" onclick="switchDashboardTab('history')">Interview
                    History</button>
            </div>

            <!-- Tab Pane 1: Mock Interview with 3 States -->
            <div id="content-interview" class="tab-content active">
                {% include 'partials/interview_setup.html' %}
                {% include 'partials/interview_active.html' %}
                {% include 'partials/interview_results.html' %}
            </div>

            <!-- Tab Pane 2: History List Container -->
            {% include 'partials/interview_history.html' %}

        </div>
    </div>

    <!-- Floating Popup Details Modal -->
    {% include 'partials/history_modal.html' %}
</body>

</html>
