<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <meta name="description" content="Secure login and registration system.">

    <link rel="stylesheet" href="../static/css/style.css">
    
    <script src="../static/js/auth.js" defer></script>

  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


</head>

<body>
    <div class="container">
        <div class="card">

            <div class="tabs">
                <button type="button" class="tab-btn active" id="login-tab" onclick="switchTab('login')">Login</button>
                <button type="button" class="tab-btn" id="register-tab"
                    onclick="switchTab('register')">Register</button>
            </div>

            <div id="message-box" class="message-box"></div>

            <div class="form-container">
                <!-- Login Form -->
                <form id="login-form" onsubmit="handleAuth(event, '/login')">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="login-username" name="username" required
                                placeholder="Enter your username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" name="password" required
                                placeholder="Enter your password">

                            <span class="password-toggle" onclick="togglePasswordVisibility('login-password', this)"><i class="fa-regular fa-eye"></i>
                            </span> 
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Access Account</button>
                </form>

                <!-- Registration Form -->
                <form id="register-form" class="hidden" onsubmit="handleAuth(event, '/register')">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="register-username" name="username" required
                                placeholder="Choose a username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="register-email" name="email" required
                                placeholder="Enter your email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="register-password" name="password" required
                                placeholder="Min. 8 chars, 1 uppercase, 1 special">

                            <span class="password-toggle" onclick="togglePasswordVisibility('register-password', this)"><i class="fa-regular fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="register-confirm" name="confirm_password" required
                                placeholder="Repeat your password">

                            <span class="password-toggle" onclick="togglePasswordVisibility('register-confirm', this)"><i class="fa-regular fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>

                <!-- OTP Verification Form -->
                <form id="verify-form" class="hidden" onsubmit="handleVerifyOTP(event)">
                    <div class="info-message" style="margin-bottom: 15px; color: #4b5563; font-size: 0.9rem;">
                        Please enter the 6-digit verification code sent to your email.
                    </div>
                    <input type="hidden" id="verify-username" name="username">
                    
                    <div class="form-group">
                        <label for="otp-code">OTP Code</label>
                        <div class="input-wrapper">
                            <input type="text" id="otp-code" name="otp" required maxlength="6" pattern="\d{6}"
                                placeholder="Enter 6-digit OTP">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Verify Account</button>
                    
                    <div class="resend-text" style="text-align: center; margin-top: 15px; font-size: 0.85rem; color: #4b5563;">
                        Didn't receive the code? <a href="#" onclick="handleResendOTP(event)" style="color: #2563eb; text-decoration: none; font-weight: 600;">Resend OTP</a>
                    </div>
                </form>
   
            </div>
        </div>
    </div>
</body>

</html>
