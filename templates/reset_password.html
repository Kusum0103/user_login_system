<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <meta name="description" content="Reset your password securely.">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="../static/js/auth.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2 class="welcome-title"
                style="text-align: center; margin-bottom: 20px; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Reset Password</h2>

            <div id="message-box" class="message-box"></div>

            <div class="form-container">
                <form id="reset-form" onsubmit="handleResetPassword(event)">
                    <!-- Hidden token field -->
                    <input type="hidden" name="token" value="{{ token }}">

                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="new-password" name="password" required
                                placeholder="Min. 8 chars, 1 uppercase, 1 special">
                            <span class="password-toggle" onclick="togglePasswordVisibility('new-password', this)"><i
                                    class="fa-regular fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm-password" name="confirm_password" required
                                placeholder="Repeat your new password">
                            <span class="password-toggle"
                                onclick="togglePasswordVisibility('confirm-password', this)"><i
                                    class="fa-regular fa-eye"></i></span>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Reset Password</button>

                    <div class="back-to-login-container"
                        style="text-align: center; margin-top: 15px; font-size: 0.85rem; color: #4b5563;">
                        <a href="/" style="color: #2563eb; text-decoration: none; font-weight: 600;">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
